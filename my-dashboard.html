<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money Hub — Future Ready Finance</title>
<meta name="description" content="Your complete financial picture in one place — budget, savings, net worth, and investing progress, with a personalized health score.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#0B1929;color:#0B1929;line-height:1.6}
a{text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(11,25,41,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem}
.nav-brand{font-family:'Playfair Display',serif;font-weight:800;font-size:1.15rem;color:#fff}
.nav-brand span{color:#0EA5A0}
.nav-links{display:flex;gap:.3rem;align-items:center}
.nav-link{color:rgba(255,255,255,.75);font-size:.88rem;font-weight:500;padding:.5rem .8rem;border-radius:7px;background:none;border:none;cursor:pointer;font-family:inherit}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-home{color:#c4b5fd;font-weight:600}
@media(max-width:720px){.nav-links{display:none}}
.page{max-width:920px;margin:0 auto;padding:2.25rem 1.2rem 4rem}
.hub-head{margin-bottom:1.75rem}
.hub-eyebrow{display:inline-flex;align-items:center;gap:.45rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#c4b5fd;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);padding:.32rem .85rem;border-radius:99px;margin-bottom:1rem}
.hub-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#a78bfa}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:800;color:#fff;line-height:1.12;margin-bottom:.4rem}
.hub-sub{color:rgba(255,255,255,.62);font-size:.98rem;max-width:600px}
.hub-greet{color:#c4b5fd;font-weight:600}
.score-banner{background:linear-gradient(135deg,#4c1d95 0%,#5b21b6 45%,#0EA5A0 130%);border-radius:20px;padding:1.75rem;margin-bottom:1.75rem;display:flex;align-items:center;gap:1.75rem;position:relative;overflow:hidden;box-shadow:0 18px 50px rgba(76,29,149,.35)}
.score-banner::after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);top:-120px;right:-60px;pointer-events:none}
.score-ring{flex-shrink:0;width:110px;height:110px;position:relative;z-index:1}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.score-ring-num .n{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;line-height:1}
.score-ring-num .of{font-size:.66rem;opacity:.7;font-weight:600}
.score-text{position:relative;z-index:1;color:#fff}
.score-label{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:.35rem}
.score-desc{font-size:.9rem;color:rgba(255,255,255,.82);line-height:1.55}
@media(max-width:560px){.score-banner{flex-direction:column;text-align:center;gap:1.1rem;padding:1.5rem}}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem;margin-bottom:1.75rem}
.tile{background:#fff;border-radius:16px;padding:1.35rem;box-shadow:0 8px 28px rgba(11,25,41,.1);border:1px solid #EEF0F4;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;position:relative}
.tile:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(76,29,149,.16)}
.tile-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.tile-name{display:flex;align-items:center;gap:.55rem;font-size:.9rem;font-weight:700;color:#334155}
.tile-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;background:rgba(139,92,246,.1)}
.tile-arrow{color:#a78bfa;font-size:1.15rem;font-weight:700}
.tile-big{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:800;line-height:1;margin-bottom:.3rem;color:#0B1929}
.tile-big.pos{color:#059669}.tile-big.neg{color:#dc2626}.tile-big.violet{color:#6d28d9}
.tile-cap{font-size:.8rem;color:#64748B;line-height:1.4}
.tile-stats{display:flex;gap:1.2rem;margin-top:.85rem;padding-top:.85rem;border-top:1px solid #F1F5F4}
.tile-stat{flex:1}
.tile-stat .l{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:#94a3b8;margin-bottom:.2rem}
.tile-stat .v{font-size:.92rem;font-weight:700;color:#0B1929}
.tile-bar{height:7px;background:#EEF0F4;border-radius:99px;overflow:hidden;margin:.7rem 0 .4rem}
.tile-bar-fill{height:100%;background:linear-gradient(90deg,#8b5cf6,#0EA5A0);border-radius:99px}
.tile-empty{font-size:.82rem;color:#94a3b8;line-height:1.5;flex:1;display:flex;flex-direction:column;justify-content:center}
.tile-empty a{color:#7c3aed;font-weight:700;display:inline-block;margin-top:.5rem}
.hub-recs-wrap{background:#fff;border-radius:16px;padding:1.6rem;box-shadow:0 8px 28px rgba(11,25,41,.1);border:1px solid #EEF0F4}
.hub-recs-wrap h3{font-family:'Playfair Display',serif;font-size:1.15rem;color:#0B1929;margin-bottom:.3rem}
.hub-recs-sub{font-size:.85rem;color:#64748B;margin-bottom:1.1rem}
.rec-card{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;border:1px solid #EEF0F4;border-radius:11px;margin-bottom:.55rem;transition:border-color .15s,background .15s}
.rec-card:hover{border-color:#a78bfa;background:rgba(139,92,246,.04)}
.rec-icon{width:38px;height:38px;border-radius:9px;background:rgba(139,92,246,.1);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.rec-text{flex:1;min-width:0}
.rec-title{display:block;font-size:.9rem;font-weight:700;color:#0B1929}
.rec-desc{display:block;font-size:.78rem;color:#64748B}
.rec-arrow{color:#a78bfa;font-weight:700;flex-shrink:0}
/* Money Roadmap resume card */
.rm-resume{display:flex;align-items:center;gap:1.1rem;background:linear-gradient(120deg,rgba(139,92,246,.12),rgba(14,165,160,.08));border:1px solid rgba(139,92,246,.28);border-radius:16px;padding:1.25rem 1.4rem;margin-bottom:1.75rem;transition:transform .2s,box-shadow .2s}
.rm-resume:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(76,29,149,.14)}
.rm-icon{flex-shrink:0;width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 6px 16px rgba(139,92,246,.3)}
.rm-body{flex:1;min-width:0}
.rm-body .rm-kick{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7c3aed;margin-bottom:.15rem}
.rm-body h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff;margin-bottom:.15rem;line-height:1.2}
.rm-body p{font-size:.82rem;color:rgba(255,255,255,.6);line-height:1.4}
.rm-cta{flex-shrink:0;background:#7c3aed;color:#fff;font-size:.84rem;font-weight:700;padding:.6rem 1.1rem;border-radius:9px;white-space:nowrap;transition:background .2s}
.rm-resume:hover .rm-cta{background:#6d28d9}
@media(max-width:560px){.rm-resume{flex-wrap:wrap}.rm-cta{width:100%;text-align:center}}
.empty-state{background:#fff;border-radius:18px;padding:2.5rem 2rem;text-align:center;box-shadow:0 8px 28px rgba(11,25,41,.1)}
.empty-emoji{font-size:2.75rem;margin-bottom:.85rem}
.empty-state h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#0B1929;margin-bottom:.5rem}
.empty-state p{font-size:.92rem;color:#64748B;max-width:440px;margin:0 auto 1.4rem;line-height:1.6}
.empty-tools{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
.empty-tool{padding:.7rem 1.1rem;border-radius:10px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:#6d28d9;font-size:.85rem;font-weight:700;transition:all .15s}
.empty-tool:hover{background:#7c3aed;color:#fff;border-color:#7c3aed}
.footer{text-align:center;padding:2rem 1rem;color:rgba(255,255,255,.3);font-size:.8rem}
.footer a{color:rgba(255,255,255,.4)}
@media(max-width:560px){h1{font-size:1.7rem}.page{padding:1.75rem 1rem 3rem}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand">Future Ready <span>Finance</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="money-roadmap.html" class="nav-link">Money Roadmap</a>
    <a href="simulations.html" class="nav-link">Calculators</a>
    <a href="guides.html" class="nav-link">Guides</a>
    <a href="my-dashboard.html" class="nav-link nav-home">My Hub</a>
  </div>
</nav>

<div class="page">
  <div class="hub-head">
    <span class="hub-eyebrow"><span class="dot"></span>Your Financial Picture</span>
    <h1>My Money Hub</h1>
    <p class="hub-sub" id="hubSub">Everything you've tracked, in one place.</p>
  </div>
  <div id="hubBody"></div>
</div>

<div class="footer">
  Your data lives only on this device — private and free. <a href="index.html">Back to home</a>
</div>

<script>
(function(){
  "use strict";
  function money(n){ n = Math.round(Number(n)||0); return '$' + n.toLocaleString('en-US'); }
  function read(key){ try{ var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; }catch(e){ return null; } }
  function sumAmt(arr){ if(!Array.isArray(arr)) return 0; var s=0; for(var i=0;i<arr.length;i++){ var a=arr[i]; s+=Number(a&&a.amount)||0; } return s; }
  function latestBudgetMonth(b){ if(!b||!b.months||typeof b.months!=='object') return null; var keys=Object.keys(b.months).sort(); for(var i=keys.length-1;i>=0;i--){ var m=b.months[keys[i]]; if(m&&(Array.isArray(m.income)||Array.isArray(m.expenses))) return m; } return null; }
  function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

  var profile=read('frf_profile_v1'), budget=read('frf_budget_v1'), sim=read('frf_sim_v1'), networth=read('frf_networth_v1'), savgoal=read('frf_savgoal_v1'), debtfree=read('frf_debtfreedom_v1'), roadmap=read('frf_roadmap_v1');
  var budMonth=latestBudgetMonth(budget);
  var hasBudget=!!budMonth;
  var hasSim=!!(sim&&sim.cash!==undefined);
  var hasNetworth=!!(networth&&(networth.cash||networth.savings||networth.investments||networth.property||networth.vehicles));
  var hasSavgoal=!!(savgoal&&savgoal.goalTarget);
  var hasProfile=!!(profile&&((profile.interests&&profile.interests.length)||(profile.needhelp&&profile.needhelp.length)||profile.income||profile.debt||profile.invested));
  var hasDebtfree=!!(debtfree&&debtfree.totalDebt>0);
  var rmData=(roadmap&&roadmap.data)?roadmap.data:null;
  var hasRoadmap=!!(rmData&&(rmData.income||rmData.debt||rmData.savings));
  var anyData=hasBudget||hasSim||hasNetworth||hasSavgoal||hasProfile||hasDebtfree||hasRoadmap;
  var body=document.getElementById('hubBody');

  if(!anyData){
    var empty=el('div','empty-state');
    empty.innerHTML='<div class="empty-emoji">\uD83D\uDCCA</div><h2>Let\u2019s build your hub</h2><p>Use any of the calculators below and your results show up here automatically \u2014 a live snapshot of your whole financial picture, with a health score.</p><div class="empty-tools"><a class="empty-tool" href="money-roadmap.html">\uD83D\uDDFA\uFE0F Money Roadmap</a><a class="empty-tool" href="simulations/budget-builder.html">\uD83D\uDCB0 Budget Builder</a><a class="empty-tool" href="simulations/net-worth.html">\uD83D\uDCC8 Net Worth</a><a class="empty-tool" href="simulations/savings-goal.html">\uD83C\uDFAF Savings Goal</a></div>';
    body.appendChild(empty);
    return;
  }

  var sub=document.getElementById('hubSub');
  if(hasBudget){
    var gInc=sumAmt(budMonth.income), gExp=sumAmt(budMonth.expenses), gLeft=gInc-gExp;
    if(gInc>0){
      if(gLeft>0) sub.innerHTML='You have <span class="hub-greet">'+money(gLeft)+'</span> left in your budget this month. Nice work staying ahead.';
      else if(gLeft<0) sub.innerHTML='Your budget is <span class="hub-greet">'+money(Math.abs(gLeft))+'</span> over this month \u2014 let\u2019s rebalance.';
      else sub.textContent='You\u2019re breaking even this month. Every dollar has a job.';
    }
  }

  var score=0, notes=[];
  if(hasBudget){ var bInc=sumAmt(budMonth.income), bExp=sumAmt(budMonth.expenses); if(bInc>0){ var sr=(bInc-bExp)/bInc; if(sr>=0.2){score+=22;notes.push('a strong savings rate');} else if(sr>=0){score+=14;} else {score+=5;notes.push('spending above income');} } else {score+=8;} }
  if(hasNetworth){ score+=18; notes.push('a tracked net worth'); }
  if(hasSavgoal){ score+=18; notes.push('an active savings goal'); }
  if(hasSim){ score+=12; notes.push('investing practice'); }
  if(hasDebtfree){ score+=15; notes.push('a debt-payoff plan'); }
  if(hasRoadmap){ score+=10; notes.push('a money roadmap'); }
  if(hasProfile){ score+=8; }
  if(score>100) score=100;
  if(score<8&&anyData) score=8;

  var scoreLabel, scoreDesc, scoreColor;
  if(score>=75){ scoreColor='#34d399'; scoreLabel='Excellent shape \uD83C\uDF1F'; scoreDesc='You\u2019re doing the things that build real financial security. Keep the momentum going.'; }
  else if(score>=50){ scoreColor='#a78bfa'; scoreLabel='Solid foundation \uD83D\uDC4D'; scoreDesc='Good habits are forming. '+(notes.length?'You\u2019ve got '+notes.slice(0,2).join(' and ')+'.':'A few more steps will round out your picture.'); }
  else { scoreColor='#fbbf24'; scoreLabel='Getting started \uD83C\uDF31'; scoreDesc='You\u2019ve taken the first step. Each calculator you use makes this picture \u2014 and your finances \u2014 stronger.'; }

  var circ=2*Math.PI*48, dash=(score/100)*circ;
  var banner=el('div','score-banner');
  banner.innerHTML='<div class="score-ring"><svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="48" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="9"/><circle cx="55" cy="55" r="48" fill="none" stroke="'+scoreColor+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+dash+' '+circ+'"/></svg><div class="score-ring-num"><span class="n">'+score+'</span><span class="of">/ 100</span></div></div><div class="score-text"><div class="score-label">'+scoreLabel+'</div><div class="score-desc">'+scoreDesc+'</div></div>';
  body.appendChild(banner);

  var grid=el('div','hub-grid');
  function makeEmptyTile(ic,name,desc,href,cta){ var a=el('a','tile'); a.setAttribute('href',href); a.innerHTML='<div class="tile-head"><div class="tile-name"><span class="tile-ic">'+ic+'</span>'+name+'</div><span class="tile-arrow">\u2192</span></div><div class="tile-empty">'+desc+'<a href="'+href+'">'+cta+'</a></div>'; return a; }

  if(hasBudget){
    var inc=sumAmt(budMonth.income), exp=sumAmt(budMonth.expenses), left=inc-exp;
    var t1=el('a','tile','<div class="tile-head"><div class="tile-name"><span class="tile-ic">\uD83D\uDCB0</span>Budget</div><span class="tile-arrow">\u2192</span></div><div class="tile-big '+(left>=0?'pos':'neg')+'">'+(left<0?'-':'')+money(Math.abs(left))+'</div><div class="tile-cap">left over this month</div><div class="tile-stats"><div class="tile-stat"><div class="l">Income</div><div class="v">'+money(inc)+'</div></div><div class="tile-stat"><div class="l">Spent</div><div class="v">'+money(exp)+'</div></div></div>');
    t1.setAttribute('href','simulations/budget-builder.html'); grid.appendChild(t1);
  } else { grid.appendChild(makeEmptyTile('\uD83D\uDCB0','Budget','Track income, spending, and what\u2019s left.','simulations/budget-builder.html','Build one \u2192')); }

  if(hasNetworth){
    var assets=(Number(networth.cash)||0)+(Number(networth.savings)||0)+(Number(networth.investments)||0)+(Number(networth.property)||0)+(Number(networth.vehicles)||0);
    var liab=(Number(networth.mortgage)||0)+(Number(networth.loans)||0)+(Number(networth.creditCards)||0)+(Number(networth.debt)||0);
    var nw=assets-liab;
    var t2=el('a','tile','<div class="tile-head"><div class="tile-name"><span class="tile-ic">\uD83D\uDCC8</span>Net Worth</div><span class="tile-arrow">\u2192</span></div><div class="tile-big '+(nw>=0?'violet':'neg')+'">'+(nw<0?'-':'')+money(Math.abs(nw))+'</div><div class="tile-cap">what you own minus what you owe</div>');
    t2.setAttribute('href','simulations/net-worth.html'); grid.appendChild(t2);
  } else { grid.appendChild(makeEmptyTile('\uD83D\uDCC8','Net Worth','The single best measure of progress.','simulations/net-worth.html','Calculate \u2192')); }

  if(hasSavgoal){
    var start=Number(savgoal.current)||Number(savgoal.saved)||0, target=Number(savgoal.goalTarget)||0;
    var pct=target>0?Math.min(Math.round(start/target*100),100):0;
    var t3=el('a','tile','<div class="tile-head"><div class="tile-name"><span class="tile-ic">\uD83C\uDFAF</span>Savings Goal</div><span class="tile-arrow">\u2192</span></div><div class="tile-big violet">'+money(start)+'</div><div class="tile-cap">of '+money(target)+' goal</div><div class="tile-bar"><div class="tile-bar-fill" style="width:'+pct+'%"></div></div><div class="tile-cap">'+pct+'% there</div>');
    t3.setAttribute('href','simulations/savings-goal.html'); grid.appendChild(t3);
  } else { grid.appendChild(makeEmptyTile('\uD83C\uDFAF','Savings Goal','Set a target and see how to reach it.','simulations/savings-goal.html','Set a goal \u2192')); }

  if(hasSim){
    var invested=0;
    if(sim.holdings&&sim.prices){ for(var t in sim.holdings){ if(sim.holdings[t]>0&&sim.prices[t]){ invested+=sim.holdings[t]*sim.prices[t]; } } }
    var total=(Number(sim.cash)||0)+invested, gain=total-10000, gainPct=gain/10000*100;
    var t4=el('a','tile','<div class="tile-head"><div class="tile-name"><span class="tile-ic">\uD83D\uDCC9</span>Investing Practice</div><span class="tile-arrow">\u2192</span></div><div class="tile-big '+(gain>=0?'pos':'neg')+'">'+money(total)+'</div><div class="tile-cap">'+(gain>=0?'+':'')+money(gain)+' ('+(gainPct>=0?'+':'')+gainPct.toFixed(1)+'%)</div>');
    t4.setAttribute('href','simulations/investment-simulator.html'); grid.appendChild(t4);
  } else { grid.appendChild(makeEmptyTile('\uD83D\uDCC9','Investing Practice','Practice with $10,000 in fake money.','simulations/investment-simulator.html','Try it \u2192')); }

  // Debt Freedom tile — from the Debt Freedom Planner
  if(hasDebtfree){
    var dfMonths=Number(debtfree.payoffMonths)||0;
    var dfYrs=Math.floor(dfMonths/12), dfMo=dfMonths%12;
    var dfTimeline = dfMonths>0 ? (dfYrs>0?dfYrs+'y ':'')+(dfMo>0?dfMo+'mo':(dfYrs>0?'':'0mo')) : '\u2014';
    var t5=el('a','tile','<div class="tile-head"><div class="tile-name"><span class="tile-ic">\uD83D\uDD13</span>Debt Freedom</div><span class="tile-arrow">\u2192</span></div><div class="tile-big '+(Number(debtfree.totalDebt)>0?'neg':'pos')+'">'+money(debtfree.totalDebt)+'</div><div class="tile-cap">total debt \u00b7 debt-free in '+dfTimeline+'</div><div class="tile-stats"><div class="tile-stat"><div class="l">Monthly</div><div class="v">'+money(debtfree.monthlyPayment)+'</div></div><div class="tile-stat"><div class="l">Focus</div><div class="v" style="font-size:.8rem">'+(debtfree.topDebt||'\u2014')+'</div></div></div>');
    t5.setAttribute('href','simulations/debt-freedom-planner.html'); grid.appendChild(t5);
  } else {
    grid.appendChild(makeEmptyTile('\uD83D\uDD13','Debt Freedom','Build a plan to crush debt fast.','simulations/debt-freedom-planner.html','Make a plan \u2192'));
  }

  body.appendChild(grid);

  // Money Roadmap resume card — appears if they have wizard progress
  if(hasRoadmap){
    var rmStep=(roadmap.step!=null)?Number(roadmap.step):0;
    var rmTotal=6;
    var rmStepNum=Math.min(rmStep+1,rmTotal);
    var rmDone=(rmStep>=rmTotal-1);
    var resume=el('a','rm-resume');
    resume.setAttribute('href','money-roadmap.html');
    resume.innerHTML='<div class="rm-icon">\uD83D\uDDFA\uFE0F</div><div class="rm-body"><div class="rm-kick">Money Roadmap</div><h3>'+(rmDone?'Your roadmap is ready':'Pick up where you left off')+'</h3><p>'+(rmDone?'Revisit your personalized step-by-step plan anytime.':'You\u2019re on step '+rmStepNum+' of '+rmTotal+' \u2014 continue building your plan.')+'</p></div><span class="rm-cta">'+(rmDone?'View plan \u2192':'Continue \u2192')+'</span>';
    body.appendChild(resume);
  }
